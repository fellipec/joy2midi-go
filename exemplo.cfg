# Exemplo de mapeamento para um gamepad genérico (tipo Xbox 360).
# Rode `jstest /dev/input/js0` primeiro pra descobrir os índices reais
# dos eixos e botões do SEU controle -- eles variam bastante entre modelos.

channel  = 1     # canal MIDI 1-16
deadzone = 2000  # ignora ruído/drift perto do centro do analógico (0-32767)

# analógico esquerdo: X = pitch bend, Y = CC1 (mod wheel)
axis 0 => bend
axis 1 => control 1 up   # centro=0, só sobe empurrando (comportamento de mod wheel real)

# analógico direito: X = CC74 (cutoff), Y ignorado
axis 3 => control 74
axis 4 => ignore

# gatilhos (se seu pad reportar como eixo): CC11 (expression)
axis 2 => control 11

# botões de face -> notas (dó central pra cima)
button 0 => note 60
button 1 => note 62
button 2 => note 64
button 3 => note 65

# ombro esquerdo como sustain pedal (CC64 on/off)
button 4 => control 64
