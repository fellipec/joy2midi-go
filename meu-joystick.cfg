# Calibrado pro "USB Game Device" (jstest: 5 eixos X,Y,Z,Hat0X,Hat0Y / 6 botões
# Trigger,ThumbBtn,ThumbBtn2,TopBtn,TopBtn2,PinkieBtn), em /dev/input/js1.
#
# Layout físico real do joystick:
#   Trigger (indicador, no manche)      -> button 0
#   ThumbBtn (polegar, embaixo do hat)  -> button 1
#   fileira de 4 na base                -> buttons 2,3,4,5
#
# NO ARDOUR, antes de usar:
#   1) Edit > Preferences > Transport > Chase > marque "Respond to MMC commands"
#   2) Window > MIDI Connections > conecte a porta "meu-joystick" em:
#        - ardour:MMC in                    (pros comandos mmc abaixo)
#        - a entrada de Generic MIDI Control (pros CCs marcados como "bind via
#          Ardour binding map" abaixo -- zoom, playhead, goto-start, metrônomo,
#          panic, master fader)
#        - a entrada MIDI do seu instrumento/synth (pro bend/mod/expression)
#   3) Pros CCs marcados como binding map: crie um binding map XML com
#      <Binding channel="1" ctl="N" value="127" action="Nome/Da/Acao"/>
#      pra cada CC, carregue em Edit > Preferences > Control Surfaces > Generic MIDI.
#      Pro fader do master: é mais simples, right-click no fader do master bus >
#      MIDI Learn > mexe no throttle.

channel  = 1
deadzone = 2000

# --- Manche principal: expressão musical, vai pro synth ---
axis 0 => bend             # pitch bend, sem mudança
axis 1 => split 1 11       # metade que já funcionava (mod, CC1) continua;
                            # a outra metade agora manda Expression (CC11)
                            # em vez de ficar desperdiçada

# --- Throttle: volume geral, via fader do Master bus (MIDI Learn) ---
axis 2 => control 20        # CC livre -- MIDI Learn no fader do Master bus

# --- Hat: navegação na timeline do Ardour (binding map) ---
axis 3 => pulse 102 103     # Hat0X: direita=CC102 (playhead pra frente),
                             # esquerda=CC103 (playhead pra trás)
                             # bind: Editor/scroll-playhead-forward / -backward
                             # (se sair invertido, troca a ordem dos 2 números)
axis 4 => pulse 104 105     # Hat0Y: cima=CC104 (zoom in), baixo=CC105 (zoom out)
                             # bind: Editor/temporal-zoom-in / temporal-zoom-out

# --- Triggers ---
button 0 => mmc record      # Trigger (indicador) -> record strobe, nativo MMC
button 1 => control 107     # ThumbBtn (polegar) -> CC livre, bind: MIDI/panic

# --- Fileira de 4 botões na base: transporte ---
button 2 => mmc play        # nativo MMC
button 3 => mmc stop        # nativo MMC
button 4 => control 108     # CC livre, bind: ação de "voltar pro início"
                             # (confirmar nome exato rodando `ardour -A`)
button 5 => control 109     # CC livre, bind: toggle do metrônomo
                             # (confirmar nome exato rodando `ardour -A`)
