# Calibrado pro "USB Game Device" (jstest: 5 eixos X,Y,Z,Hat0X,Hat0Y / 6 botões
# Trigger,ThumbBtn,ThumbBtn2,TopBtn,TopBtn2,PinkieBtn), em /dev/input/js1.
#
# Foco: controle de transporte do Ardour via MMC (MIDI Machine Control).
# O Ardour entende MMC nativamente -- não precisa de MIDI Learn pros botões
# de transporte, só habilitar em:
#   Edit > Preferences > Transport > Chase > "Respond to MMC commands"
# e conectar a porta "meu-joystick" na entrada ardour:MMC in, em:
#   Window > MIDI Connections

channel  = 1
deadzone = 2000

# X e Y do manche principal seguem livres pra expressão musical
axis 0 => bend            # X -> pitch bend
axis 1 => control 1 up    # Y -> CC1 (mod wheel), centro=0, só sobe empurrando pra cima
                           # (troque "up" por "down" se sair invertido, ou "abs" se
                           #  quiser que os dois lados aumentem a modulação)
axis 2 => control 74      # Z -> cutoff de filtro

# Hat vira um "d-pad" de transporte, tipo um deck de fita:
# cima=play, baixo=stop, direita=avança, esquerda=retrocede.
# Nenhum desses precisa de MIDI Learn -- é MMC puro.
axis 3 => mmc ffwd rewind   # Hat0X: direita=fast-forward, esquerda=rewind
axis 4 => mmc play stop     # Hat0Y: cima=play, baixo=stop

# Botões: 2 dedicados a MMC (não precisam de MIDI Learn),
# os outros 4 ficam livres como CC pra você vincular no Ardour via
# clique direito num controle de transporte/editor -> "MIDI Learn"
# (ex.: Add Marker, Loop Toggle, Locate to Start, o que quiser).
button 0 => mmc record     # Trigger -> record strobe (punch in)
button 1 => mmc pause      # ThumbBtn -> pause
button 2 => control 82     # ThumbBtn2 -> livre (ex: Add Marker)
button 3 => control 83     # TopBtn -> livre (ex: Loop Toggle)
button 4 => control 84     # TopBtn2 -> livre
button 5 => control 85     # PinkieBtn -> livre
